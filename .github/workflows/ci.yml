name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e ".[test]"
      - name: Verify runtime dependencies
        run: |
          python -c "import pydantic, ccxt; print('pydantic', pydantic.__version__)"
          python -c "import app"
      - name: Test
        run: pytest
